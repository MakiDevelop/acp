services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: acp
      POSTGRES_PASSWORD: acp
      POSTGRES_DB: acp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acp"]
      interval: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8700:8700"
    environment:
      DATABASE_URL: postgresql://acp:acp@postgres:5432/acp
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
